name: Manual PyPI Publish

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'PyPI environment to publish to'
        required: true
        type: choice
        options:
          - testpypi
          - pypi
        default: 'testpypi'

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install build dependencies
        run: uv sync --group publish

      - name: Build package
        run: uv run python -m build

      - name: Check package
        run: uv run twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.environment == 'pypi' && 'https://pypi.org/p/vdsxarray' || 'https://test.pypi.org/p/vdsxarray' }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        if: inputs.environment == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

      - name: Publish to PyPI
        if: inputs.environment == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
